services:
  qaweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qaweb
    ports:
      - "3000:3000"
    volumes:
      - qaweb-data:/app/data
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-2h}
      - DB_PATH=/app/data/qaweb.db
    restart: unless-stopped

volumes:
  qaweb-data:
